<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <title>Garee Uumi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e5ddd5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 400px; }
        h4 { color: #075e54; text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 14px; color: #555; display: block; margin-top: 10px; }
        input[type="text"], textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        .user-list { 
            max-height: 200px; 
            overflow-y: auto; 
            margin: 15px 0; 
            padding: 10px; 
            border: 1px solid #eee; 
            border-radius: 5px;
            background: #fafafa;
        }
        .user-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 8px; 
            border-bottom: 1px solid #eee; 
        }
        .user-item:last-child { border-bottom: none; }
        .user-item input { cursor: pointer; width: 18px; height: 18px; }
        
        button { 
            width: 100%; 
            padding: 12px; 
            background: #075e54; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            margin-top: 15px;
        }
        button:hover { background: #128c7e; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #075e54; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h4>Garee Haaraa Uumi</h4>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label>Maqaa Garee</label>
            <input type="text" name="group_name" required placeholder="Fkn: Maatii koo">
            
            <label>Ibsa Garee</label>
            <textarea name="description" rows="2" placeholder="Garee kana irratti maaltu dubbatama?"></textarea>
            
            <label>Miseensota Filadhu</label>
            <div class="user-list">
                {% for user in all_users %}
                    <div class="user-item">
                        <input type="checkbox" name="members" value="{{ user.id }}" id="user_{{ user.id }}">
                        <label for="user_{{ user.id }}" style="margin: 0; font-weight: normal; cursor: pointer;">
                            {{ user.username }}
                        </label>
                    </div>
                {% empty %}
                    <p style="font-size: 12px; color: #888; text-align: center;">Namni biraa hin jiru.</p>
                {% endfor %}
            </div>
            
            <label>Suuraa Garee (Optional)</label>
            <input type="file" name="group_icon" style="margin-top: 5px;">
            
            <button type="submit">Uumi</button>
        </form>
        <a href="/chat/" class="back-link">← Gara Lobby Deebi'i</a>
    </div>
</body>
</html>
