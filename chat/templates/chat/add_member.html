<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <title>Miseensa Dabali</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h3 { color: #075e54; }
        .user-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Garee: {{ group.group_name }}</h3>
        <p>Miseensota haaraa filadhu:</p>
        <form method="POST">
            {% csrf_token %}
            {% for user in non_members %}
                <div class="user-item">
                    <input type="checkbox" name="members" value="{{ user.id }}" id="u{{ user.id }}">
                    <label for="u{{ user.id }}">{{ user.username }}</label>
                </div>
            {% empty %}
                <p>Namni haaraa dabalamu hin jiru.</p>
            {% endfor %}
            <button type="submit">Dabali</button>
        </form>
        <br>
        <a href="{% url 'chat:group_room' group.id %}" style="color: #666; text-decoration: none;">← Duubatti Deebi'i</a>
    </div>
</body>
</html>
