<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <title>Waan-ofii - WhatsApp Style</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .message { max-width: 65%; padding: 8px 12px; border-radius: 8px; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
        .sent { align-self: flex-end; background-color: #dcf8c6; border-top-right-radius: 0; }
        .received { align-self: flex-start; background-color: #ffffff; border-top-left-radius: 0; }
        .msg-user { font-size: 11px; font-weight: bold; color: #075e54; display: block; }
        .chat-media { max-width: 100%; border-radius: 5px; margin-top: 5px; display: block; }
        #input-area { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; flex-direction: column; }
        .controls-wrapper { display: flex; width: 100%; align-items: center; gap: 10px; }
        .input-box { flex: 1; background: white; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        #chat-message-input { flex: 1; border: none; padding: 10px; outline: none; }
        .btn-send { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        .recording { color: red !important; font-weight: bold; }
        
        /* Status Area Style */
        #status-area { padding: 5px 20px; font-size: 13px; height: 25px; display: flex; align-items: center; gap: 10px; background: #f0f0f0; border-bottom: 1px solid #ddd; }
        .online-dot { height: 10px; width: 10px; background-color: #25d366; border-radius: 50%; display: inline-block; }
        #online-text { color: #075e54; font-weight: bold; }
        #typing-text { color: #34b7f1; font-style: italic; margin-left: 10px; }
    </style>
</head>
<body>

<div id="status-area">
    <div id="online-status">
        <span class="online-dot"></span>
        <span id="online-text">Online</span>
    </div>
    <div id="typing-text"></div> </div>

<div id="chat-log">
    {% for msg in messages %}
        <div class="message {% if msg.user == request.user %}sent{% else %}received{% endif %}">
            <span class="msg-user">{{ msg.user.username }}</span>
            {% if msg.content %}<p>{{ msg.content }}</p>{% endif %}
            {% if msg.image %}<img src="{{ msg.image.url }}" class="chat-media">{% endif %}
            {% if msg.audio %}<audio controls class="chat-media"><source src="{{ msg.audio.url }}"></audio>{% endif %}
        </div>
    {% endfor %}
</div>

<div id="input-area">
    <div class="controls-wrapper">
        <input type="file" id="file-input" style="display:none" accept="image/*,audio/*">
        <span style="cursor:pointer; font-size: 24px;" onclick="document.getElementById('file-input').click()">📎</span>
        
        <div class="input-box">
            <input id="chat-message-input" type="text" placeholder="Ergaa barreessi..." autocomplete="off">
        </div>

        <span id="voice-btn" style="cursor:pointer; font-size: 24px;">🎙️</span>
        <button id="send-btn" class="btn-send">➤</button>
    </div>
</div>

{{ room_name|json_script:"room-name" }}

<script>
    const roomName = JSON.parse(document.getElementById('room-name').textContent);
    const chatSocket = new WebSocket('ws://' + window.location.host + '/ws/chat/' + roomName + '/');
    const chatLog = document.querySelector('#chat-log');
    const typingDisplay = document.querySelector('#typing-text'); // Sirreeffama: typing-text fayyadamne
    
    chatLog.scrollTop = chatLog.scrollHeight;

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);

        // --- STATUS LOGIC ---
        if (data.type === 'status') {
            const statusText = document.querySelector('#online-text');
            const statusDot = document.querySelector('.online-dot');
            if (data.status === 'online') {
                statusText.innerText = "Online";
                statusDot.style.backgroundColor = "#25d366";
            } else {
                statusText.innerText = "Offline";
                statusDot.style.backgroundColor = "#bbb";
            }
            return;
        }

        // --- TYPING LOGIC ---
        if (data.type === 'typing') {
            if (data.typing && data.username !== "{{ request.user.username }}") {
                typingDisplay.innerText = data.username + " barreessaa jira...";
            } else {
                typingDisplay.innerText = "";
            }
            return;
        }

        // --- MESSAGE LOGIC ---
        const isMe = data.username === "{{ request.user.username }}";
        let imageHtml = data.image ? `<img src="${data.image}" class="chat-media">` : '';
        let audioHtml = data.audio ? `<audio controls class="chat-media"><source src="${data.audio}"></audio>` : '';
        
        let html = `<div class="message ${isMe ? 'sent' : 'received'}">
            <span class="msg-user">${data.username}</span>
            ${data.message ? `<p>${data.message}</p>` : ''}
            ${imageHtml}
            ${audioHtml}
        </div>`;
        
        chatLog.insertAdjacentHTML('beforeend', html);
        chatLog.scrollTop = chatLog.scrollHeight;
        typingDisplay.innerText = ""; 
    };

    // Ergaa Barreeffamaa erguu
    document.querySelector('#send-btn').onclick = function() {
        const input = document.querySelector('#chat-message-input');
        if (input.value.trim()) {
            chatSocket.send(JSON.stringify({
                'message': input.value,
                'username': "{{ request.user.username }}"
            }));
            input.value = '';
        }
    };

    // --- TYPING INPUT LISTENER ---
    let typingTimer;
    document.querySelector('#chat-message-input').addEventListener('input', () => {
        chatSocket.send(JSON.stringify({
            'type': 'typing',
            'typing': true
        }));
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            chatSocket.send(JSON.stringify({
                'type': 'typing',
                'typing': false
            }));
        }, 2000); 
    });

    // Media Upload (Ajax)
    document.querySelector('#file-input').onchange = function(e) {
        const file = e.target.files[0];
        const formData = new FormData();
        formData.append('room_name', roomName);
        if (file.type.startsWith('image/')) formData.append('image', file);
        else formData.append('audio', file);

        fetch('/chat/upload_media/', {
            method: 'POST',
            body: formData,
            headers: {'X-CSRFToken': '{{ csrf_token }}'}
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                chatSocket.send(JSON.stringify({
                    'message': '',
                    'username': "{{ request.user.username }}",
                    'image': file.type.startsWith('image/') ? data.url : null,
                    'audio': file.type.startsWith('audio/') ? data.url : null
                }));
            }
        });
    };

    // Voice Record logic
    let mediaRecorder;
    let audioChunks = [];
    document.querySelector('#voice-btn').onmousedown = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mpeg' });
                const formData = new FormData();
                formData.append('audio', audioBlob, 'voice.mp3');
                formData.append('room_name', roomName);
                const res = await fetch('/chat/upload_media/', { method: 'POST', body: formData, headers: {'X-CSRFToken': '{{ csrf_token }}'} });
                const data = await res.json();
                chatSocket.send(JSON.stringify({
                    'message': '',
                    'username': "{{ request.user.username }}",
                    'audio': data.url
                }));
            };
            mediaRecorder.start();
            document.querySelector('#voice-btn').classList.add('recording');
        } catch (err) { console.error("Mic error:", err); }
    };
    document.querySelector('#voice-btn').onmouseup = () => {
        if(mediaRecorder && mediaRecorder.state !== "inactive") { 
            mediaRecorder.stop(); 
            document.querySelector('#voice-btn').classList.remove('recording'); 
        }
    };
</script>
</body>
</html>
