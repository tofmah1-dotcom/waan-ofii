{% extends 'base.html' %}

{% block content %}
<div class="mt-2">
    <h6 class="fw-bold mb-3 text-uppercase" style="font-size: 0.8rem; color: #555;">Meeshaalee Gurguraman</h6>
    <div class="row gx-2">
        {% for product in products %}
        <div class="col-6 col-md-4 mb-3">
            <div class="card h-100 shadow-sm border-0" style="border-radius: 12px; overflow: hidden; background: white;">
                {% if product.image %}
                <img src="{{ product.image.url }}" class="card-img-top" style="height: 140px; object-fit: cover;">
                {% endif %}
                <div class="card-body p-2">
                    <h6 class="mb-1 fw-bold text-truncate" style="font-size: 0.9rem;">{{ product.name }}</h6>
                    <p class="text-success small fw-bold mb-1">{{ product.price }} ETB</p>
                    <small class="text-muted d-block mb-2"><i class="fas fa-map-marker-alt"></i> {{ product.location }}</small>
                    <a href="tel:{{ product.phone_number }}" class="btn btn-success btn-sm w-100 rounded-pill" style="font-size: 0.8rem;">
                        <i class="fas fa-phone-alt"></i> Bilbili
                    </a>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="text-center mt-5 w-100">
            <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
            <p class="text-muted">Meeshaan barbaadame hin argamne.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
