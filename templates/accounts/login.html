<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waan-ofii - Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 350px; text-align: center; }
        h2 { color: #075e54; margin-bottom: 1.5rem; }
        
        /* Form styling */
        form p { text-align: left; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .btn-login { width: 100%; padding: 12px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-login:hover { background: #128c7e; }
        
        /* Google Button */
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; background: white; border: 1px solid #ccc; border-radius: 5px; text-decoration: none; color: #444; margin-bottom: 20px; transition: 0.3s; }
        .google-btn:hover { background: #f1f1f1; }
        
        .divider { margin: 20px 0; position: relative; border-top: 1px solid #eee; }
        .divider span { position: absolute; top: -12px; background: white; padding: 0 10px; left: 50%; transform: translateX(-50%); color: #888; font-size: 12px; }
        
        .register-link { margin-top: 20px; font-size: 14px; color: #555; }
        .register-link a { color: #075e54; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Waan-ofii</h2>

        {% load socialaccount %}
        <a href="{% provider_login_url 'google' %}" class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="G">
            Google-iin seeni
        </a>

        <div class="divider"><span>Yookaan</span></div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-login">Gali</button>
        </form>

        <div class="register-link">
            Account hin qabduu? <a href="/register/">Asitti uumi</a>
        </div>
    </div>
</body>
</html>
