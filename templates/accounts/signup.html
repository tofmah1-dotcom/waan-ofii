<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waan-ofii - Galmee</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 380px; text-align: center; }
        h2 { color: #075e54; margin-bottom: 1rem; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 1.5rem; }
        
        /* Form styling */
        form p { text-align: left; margin-bottom: 15px; color: #444; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        /* Help text (Password requirements) */
        .helptext { font-size: 11px; color: #888; display: block; margin-top: 5px; }

        .btn-signup { width: 100%; padding: 12px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-signup:hover { background: #128c7e; }
        
        .divider { margin: 25px 0; position: relative; border-top: 1px solid #eee; }
        .divider span { position: absolute; top: -12px; background: white; padding: 0 10px; left: 50%; transform: translateX(-50%); color: #888; font-size: 12px; }
        
        .login-link { margin-top: 20px; font-size: 14px; color: #555; }
        .login-link a { color: #075e54; font-weight: bold; text-decoration: none; }

        /* Error messages */
        .errorlist { color: #d9534f; list-style: none; padding: 0; font-size: 13px; text-align: left; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2>Waan-ofii uumi</h2>
        <p class="subtitle">Maatii Waan-ofii guddichaatti makami!</p>

        {% load socialaccount %}
        <a href="{% provider_login_url 'google' %}" style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; background: white; border: 1px solid #ccc; border-radius: 5px; text-decoration: none; color: #444; margin-bottom: 20px; font-size: 14px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="G">
            Google-iin galmaa'i
        </a>

        <div class="divider"><span>Yookaan</span></div>

        <form method="post" action="{% url 'account_signup' %}">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="errorlist">
                    Maalo, odeeffannoo galchite deebisii mirkaneessi.
                </div>
            {% endif %}

            {{ form.as_p }}
            
            <button type="submit" class="btn-signup">Galmaa'i</button>
        </form>

        <div class="login-link">
            Account qabduu? <a href="{% url 'account_login' %}">Seeni (Login)</a>
        </div>
    </div>
</body>
</html>
