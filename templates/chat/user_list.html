{% extends 'home.html' %}
{% block content %}
<div class="container mt-5">
    <h3 class="fw-bold mb-4 text-primary"><i class="fas fa-comments"></i> Namoota Waliin Chat Jalqabdu Fili:</h3>
    <div class="list-group shadow-sm border-0">
        {% for user in users %}
            {% if user != request.user %}
            <a href="{% url 'chat_room' user.username %}" class="list-group-item list-group-item-action d-flex align-items-center py-3 mb-2 rounded shadow-sm border-0">
                <i class="fas fa-user-circle fa-2x me-3 text-secondary"></i>
                <span class="fw-bold fs-5">{{ user.username }}</span>
                <i class="fas fa-chevron-right ms-auto text-muted"></i>
            </a>
            {% endif %}
        {% empty %}
            <p class="text-muted">Namni biroon hin jiru.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
