<!DOCTYPE html>
<html>
<head>
    <title>Waan-ofii AI</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .chat-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .messages { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 20px; }
        .user-msg { color: blue; }
        .ai-msg { color: green; }
   
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --user-msg-bg: #dbeafe;
            --ai-msg-bg: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .chat-card {
            width: 100%; max-width: 500px; height: 80vh;
            background: white; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .chat-header {
            background: var(--primary-color); color: white;
            padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem;
        }

        .messages-area {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            background: #fafafa;
        }

        .message {
            max-width: 80%; padding: 12px 16px; border-radius: 15px;
            line-height: 1.5; font-size: 0.95rem;
        }

        .user-message {
            align-self: flex-end; background: var(--user-msg-bg);
            border-bottom-right-radius: 2px; color: #1e40af;
        }

        .ai-message {
            align-self: flex-start; background: var(--ai-msg-bg);
            border: 1px solid #e5e7eb; border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 20px; border-top: 1px solid #eee; background: white;
            display: flex; gap: 10px;
        }

        input[type="text"] {
            flex: 1; padding: 12px; border: 1px solid #ddd;
            border-radius: 25px; outline: none; transition: 0.3s;
        }

        input[type="text"]:focus { border-color: var(--primary-color); }

        button {
            background: var(--primary-color); color: white; border: none;
            padding: 10px 20px; border-radius: 25px; cursor: pointer;
            transition: 0.3s; font-weight: bold;
        }

        button:hover { background: #1d4ed8; }

        .back-link {
            text-align: center; padding-bottom: 10px; font-size: 0.8rem;
        }
        
        a { color: #666; text-decoration: none; }
    
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Waan-ofii AI Chat</h2>
        <div class="messages">
            {% if query %}
                <p class="user-msg"><strong>Ati:</strong> {{ query }}</p>
            {% endif %}
            {% if response %}
                <p class="ai-msg"><strong>AI:</strong> {{ response }}</p>
            {% endif %}
        </div>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="message" placeholder="Gaaffii kee barreessi..." style="width: 80%; padding: 10px;">
            <button type="submit" style="padding: 10px;">Ergi</button>
        </form>
        <br>
        <a href="{% url 'chat:lobby' %}">Gara Lobby Deebi'i</a>
    </div>
</body>
</html>
