<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oduu Haaraa Maxxansi | Waan-Ofii</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .form-container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #075e54; text-align: center; font-weight: bold; margin-bottom: 25px; }
        
        .voice-section { background: #fff5f8; padding: 20px; border-radius: 12px; border: 2px dashed #e91e63; text-align: center; margin: 20px 0; }
        .btn-record { background: #e91e63; color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-record:hover { background: #c2185b; }
        .recording { background: #333 !important; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #submit-btn { background: #25d366; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #submit-btn:hover { background: #1ebe57; }
        #audio-preview { width: 100%; margin-top: 15px; display: none; }
        .form-label { font-weight: 600; color: #444; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>🎙️ Oduu Haaraa Maxxansi</h2>
    
    <form id="post-form">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">Mata-duree Oduu</label>
            <input type="text" id="title" class="form-control" placeholder="Fkn: Waancaa Atileetiksii Addunyaa..." required>
        </div>

        <div class="mb-3">
            <label class="form-label">Gosa Oduu (Category)</label>
            <select id="category" class="form-select" required>
                <option value="">-- Filadhu --</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Qabiyyee Oduu</label>
            <textarea id="content" class="form-control" rows="5" placeholder="Waayee oduu kanaa gabaabsii barreessi..." required></textarea>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Suuraalee (Baay'ee filachuu dandeessa)</label>
            <input type="file" id="images" class="form-control" multiple accept="image/*">
        </div>

        <div class="voice-section">
            <p class="mb-2"><strong>Afaaniin waraabii dabali:</strong></p>
            <button type="button" id="record-btn" class="btn-record">🔴 Waraabuu Jalqabi</button>
            <p id="record-status" class="mt-2 text-muted small"></p>
            <audio id="audio-preview" controls></audio>
        </div>

        <button type="submit" id="submit-btn">🚀 MAXXANSI ODUU</button>
    </form>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let audioBlob = null;

    const recordBtn = document.getElementById('record-btn');
    const statusText = document.getElementById('record-status');
    const audioPreview = document.getElementById('audio-preview');

    // 1. Logic Waraabaa (Audio Recording)
    recordBtn.addEventListener('click', async () => {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/mpeg' });
                    audioPreview.src = URL.createObjectURL(audioBlob);
                    audioPreview.style.display = 'block';
                    statusText.innerText = "Waraabamee qophaa'eera ✅";
                    recordBtn.innerText = "Deebisii Waraab";
                    recordBtn.classList.remove('recording');
                };

                mediaRecorder.start();
                recordBtn.innerText = "🛑 Dhaabi (Waraabaa jira...)";
                recordBtn.classList.add('recording');
                statusText.innerText = "Sagalee kee dhageessisaa jirta...";
            } catch (err) {
                alert("Microphone banuuf hayyama kennaa!");
            }
        } else {
            mediaRecorder.stop();
        }
    });

    // 2. Form Erguu (Submit Logic to API)
    document.getElementById('post-form').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerText = "Maxxanfamaa jira...";

        const formData = new FormData();
        formData.append('title', document.getElementById('title').value);
        formData.append('content', document.getElementById('content').value);
        formData.append('category', document.getElementById('category').value); // ID Category
        
        // Suuraalee dabaluu
        const imageFiles = document.getElementById('images').files;
        for (let i = 0; i < imageFiles.length; i++) {
            formData.append('uploaded_images', imageFiles[i]);
        }

        // Sagalee waraabame dabaluu
        if (audioBlob) {
            formData.append('voice_audio', audioBlob, 'voice_news.mp3');
        }

        try {
            const response = await fetch('/blog/api/posts/', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            });

            if (response.ok) {
                alert("Oduun milkaa'inaan maxxanfameera! ✅");
                window.location.href = "/blog/"; 
            } else {
                const errorData = await response.json();
                console.log(errorData);
                alert("Dogoggorri uumameera. Maaloo deebisii yaali.");
                submitBtn.disabled = false;
                submitBtn.innerText = "MAXXANSI ODUU";
            }
        } catch (error) {
            alert("Network error: Server waliin wal qunnamuun hin danda'amne.");
            submitBtn.disabled = false;
        }
    };
</script>

</body>
</html>
