{% extends 'home.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <h1>{{ post.title }}</h1>
            <p class="text-muted">Barreeffame: {{ post.created_at }}</p>
            <hr>
            {% if post.image %}
                <img src="{{ post.image.url }}" class="img-fluid rounded mb-4" alt="{{ post.title }}">
            {% endif %}
            <div class="content">
                {{ post.content|linebreaks }}
            </div>
            <a href="{% url 'home' %}" class="btn btn-secondary mt-4">Gara Fuula Jalqabaa</a>
        </div>
    </div>
</div>
{% endblock %}
